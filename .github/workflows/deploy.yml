name: Deploy slides

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Build
        run: npx slidev build slides.md --base /dsomop_ethiopia/ --out dist

      - name: Redirect bare-path deep links to hash route
        run: |
          cat > dist/404.html <<'HTML'
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="utf-8">
          <title>dsOMOP Workshop</title>
          <script>
          (function () {
            var base = '/dsomop_ethiopia/';
            var l = window.location;
            var sub = l.pathname.indexOf(base) === 0 ? l.pathname.slice(base.length) : '';
            sub = sub.replace(/^\/+/, '');
            l.replace(base + (sub ? '#/' + sub : '') + l.search);
          })();
          </script>
          </head>
          <body></body>
          </html>
          HTML

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
